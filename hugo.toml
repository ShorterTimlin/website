baseURL = 'https://example.org/'
languageCode = 'en-us'
title = 'Shorter Timlin Archivists & Historians'
theme = 'hugo-serif-theme'

# Enable emoji support
enableEmoji = true

# Pagination
paginate = 6

# Taxonomies
[taxonomies]
  category = 'categories'
  tag = 'tags'

# Parameters
[params]
  google_analytics_id = ""
  favicon = "favicon.ico"

  # Homepage
  [params.homepage]
    sticky_header = true
    show_contact_box = true
    show_services_button = true

  # Logo
  [params.logo]
    mobile = "images/logo/logo-full.png"
    mobile_height = "50px"
    desktop = "images/logo/logo-full.png"
    desktop_height = "60px"
    alt = "Shorter Timlin Archivists & Historians"

  # Fonts
  [params.fonts]
    google_fonts = 'https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Lora:wght@400;500&display=swap'
    heading = "Playfair Display"
    base = "Lora"

  # Colors - Heritage parchment theme matching logo
  [params.colors]
    primary = "#8b7765"
    black = "#2f2f41"
    white = "#fffdf8"
    white_offset = "#f5f1e8"
    grey = "#6b5d4f"

  # Services
  [params.services]
    summary_truncate = 120

  # Footer
  [params.footer]
    copyright_text = '&copy; 2024 Shorter Timlin Archivists & Historians. All rights reserved.'

  # Contact
  [params.contact]
    email = "info@shortertimlinarchivists.com"
    phone = "(555) 123-4567"
    address = ""

  # Social media
  [params.social]
    linkedin = ""
    twitter = ""

# Menu
[[menu.main]]
  name = "Services"
  url = "/services/"
  weight = 1

[[menu.main]]
  name = "Case Studies"
  url = "/case-studies/"
  weight = 2

[[menu.main]]
  name = "About"
  url = "/about/"
  weight = 3

[[menu.main]]
  name = "Contact"
  url = "/contact/"
  weight = 4

# Markup settings
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

# Output formats
[outputs]
  home = ["HTML", "RSS"]
  section = ["HTML"]
