{{ if .Params.intro_images }}
<div class="col-12 col-md-5 col-lg-6 order-1 order-md-2 position-relative">
  <div class="intro-image-pair">
    {{ range $index, $image := .Params.intro_images }}
      <img
        alt="{{ if eq $index 0 }}Helen Timlin{{ else if eq $index 1 }}Rebecca Shorter{{ else }}{{ $.Title }}{{ end }}"
        class="intro-image intro-image-pair__item"
        src="{{ $image | relURL }}"
      />
    {{ end }}
  </div>
</div>
{{ else if .Params.intro_image }}
<div class="col-12 col-md-5 col-lg-6 order-1 order-md-2 position-relative">
  <img
    alt="{{ .Title }}"
    class="intro-image{{ if .Params.intro_image_absolute }} intro-image-absolute{{ end }}{{ if .Params.intro_image_hide_on_mobile }} intro-image-hide-mobile{{ end }}"
    src="{{ .Params.intro_image | relURL }}"
    style="{{ if .Params.intro_image_absolute_offset }}inset: {{ .Params.intro_image_absolute_offset }};{{end}}"
  />
</div>
{{ end }}
