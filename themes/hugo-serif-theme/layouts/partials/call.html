<div class="call">
  <div class="call-box-top">
    {{ if .site.Params.contact.phone }}
    <div class="call-phone"><strong>Phone: </strong> {{ .site.Params.contact.phone }}</div>
    {{ end }}
    {{ if .site.Params.contact.email }}
    <div class="call-email"><strong><a href="mailto:{{ .site.Params.contact.email }}">Email</a>: </strong>
      <a href="mailto:{{ .site.Params.contact.email }}">
        {{ .site.Params.contact.email }}
      </a>
    </div>
    {{ end }}
  </div>
    {{ if eq .show_button "true" }}
      <div class="call-box-bottom">
        <a href="mailto:{{ .site.Params.contact.email }}" class="button">Email Us</a>
      </div>
    {{ end }}
</div>
